version: 1.0.0
shared:
  intensity_scale:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  required_signature_fields:
  - manual_entry_share
  - overtime_hours
  - exception_rate
  - retro_adjustment_count
  - attestation_volume
  - schedule_change_rate
  defaults:
    manual_multiplier: 1.0
    overtime_multiplier: 1.0
    absence_multiplier: 1.0
    exception_multiplier: 1.0
overlays:
  delta:
  - id: delta_2020_grounding
    start: '2020-03-11'
    end: '2020-12-31'
    cause: pandemic grounding and status churn
    effects:
      operation_volume: 0.35
      manual_multiplier: 2.0
      exception_multiplier: 2.0
  - id: delta_2021_2022_recovery
    start: '2021-01-01'
    end: '2022-12-31'
    cause: recovery surge
    effects:
      overtime_multiplier: 1.7
      schedule_change_multiplier: 1.8
  - id: delta_2024_crowdstrike
    start: '2024-07-19'
    end: '2024-07-24'
    cause: crew-system outage and manual synchronization
    effects:
      manual_multiplier: 4.5
      exception_multiplier: 3.5
      schedule_change_multiplier: 4.0
      retro_multiplier: 2.5
    expected:
      manual_entry_share_multiplier_min: 4.0
      legality_hold_multiplier_min: 3.0
  ascension:
  - id: ascension_2020_2021_pandemic
    start: '2020-03-11'
    end: '2021-12-31'
    cause: clinical surge
    effects:
      overtime_multiplier: 2.0
      absence_multiplier: 1.5
      exception_multiplier: 1.7
  - id: ascension_2024_cyber
    start: '2024-05-08'
    end: '2024-06-30'
    cause: network interruption and manual documentation
    effects:
      manual_multiplier: 5.5
      exception_multiplier: 4.0
      retro_multiplier: 4.0
      attestation_multiplier: 5.0
    expected:
      manual_entry_share_multiplier_min: 5.0
      retro_adjustment_multiplier_min: 4.0
  mgm_lv:
  - id: mgm_2020_closure
    start: '2020-03-17'
    end: '2020-09-30'
    cause: property closure and staged reopening
    effects:
      operation_volume: 0.25
      manual_multiplier: 2.0
      status_churn_multiplier: 5.0
  - id: mgm_2023_cyber
    start: '2023-09-11'
    end: '2023-10-05'
    cause: property-system cyber disruption
    effects:
      manual_multiplier: 6.5
      exception_multiplier: 4.5
      attestation_multiplier: 5.5
      retro_multiplier: 2.5
    expected:
      manual_entry_share_multiplier_min: 6.0
      attestation_multiplier_min: 5.0
  schneider:
  - id: schneider_2020_volatility
    start: '2020-03-11'
    end: '2021-12-31'
    cause: supplier and on-site access volatility
    effects:
      absence_multiplier: 1.5
      schedule_change_multiplier: 1.8
  - id: schneider_2022_electrification
    start: '2022-08-16'
    end: '2026-12-31'
    cause: electrification demand and qualification growth
    effects:
      overtime_multiplier: 1.4
      qualification_demand_multiplier: 1.7
      schedule_change_multiplier: 1.3
    expected:
      qualification_queue_multiplier_min: 1.5
  pepsico:
  - id: pepsico_2020_2021_supply_chain
    start: '2020-03-11'
    end: '2021-12-31'
    cause: value-chain disruption
    effects:
      overtime_multiplier: 1.8
      manual_multiplier: 2.5
      exception_multiplier: 1.7
      schedule_change_multiplier: 1.6
    expected:
      overtime_multiplier_min: 1.6
      exception_multiplier_min: 1.5
  - id: pepsico_2023_2026_biometric_governance
    start: '2023-01-01'
    end: '2026-12-31'
    cause: biometric governance tightening
    effects:
      alternative_auth_multiplier: 2.0
      consent_refresh_multiplier: 2.0
    expected:
      alternative_auth_share_min: 0.05
