name: Install Full UKG Data Generator

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: install-full-ukg-data-generator
  cancel-in-progress: false

jobs:
  install:
    name: Install generator and open pull request
    runs-on: ubuntu-24.04
