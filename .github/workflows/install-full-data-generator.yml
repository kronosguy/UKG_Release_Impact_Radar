      - name: Validate installed source tree
        shell: bash
        run: |
          set -euo pipefail
          test -f requirements.txt
          test -f config/export-object-catalog.yaml
          test -f control-plane/scenario-calendar.yaml
          test -f generator/engine.py
          test -f scripts/generate_all.py
          test -f database/migrations/0005_rls_and_roles.sql
          test -f tenants/mgm_lv.yaml
          test -f tenants/ascension.yaml
          test -f tenants/delta.yaml
          test -f tenants/schneider.yaml
          test -f tenants/pepsico.yaml

          python - <<'PYVALIDATE'
          from pathlib import Path
          import yaml
          catalog = yaml.safe_load(Path('config/export-object-catalog.yaml').read_text(encoding='utf-8'))
          objects = catalog['spec']['objects']
          if len(objects) != 337:
              raise SystemExit(f'Expected 337 SDM objects; found {len(objects)}')
          print('PASS: 337-object UKG SDM catalog')
          PYVALIDATE

      - name: Create installation branch and pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="feat/full-data-generator-${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Convert repository into full deterministic UKG data generator"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --title "Convert repository into full UKG data generator" \
            --body "Installs the deterministic 2016-2026 five-tenant generator, preserves the 337-object SDM foundation layer, adds assurance artifacts, tenant-specific scenario generation, Supabase migrations/load controls, tests, packaging, and GitHub Actions orchestration."

      - name: Installation summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          # Full data generator installed

          The workflow created a feature branch and opened a pull request against the repository's default branch.

          The generated repository includes:

          - MGM Resorts Las Vegas / P01
          - Ascension Healthcare / P02
          - Delta Air Lines / P03
          - Schneider Electric / P04
          - PepsiCo / P05
          - deterministic 2016-2026 history generation
          - 337-object UKG SDM compatibility output
          - Evidence Envelopes and Decision Passports
          - Supabase migrations, forced RLS, and opt-in loading
          - tenant-specific scenario and acceptance gates
          SUMMARY
