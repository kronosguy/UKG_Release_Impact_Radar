          test -f "$PAYLOAD_ROOT/config/export-object-catalog.yaml"
          test -f "$PAYLOAD_ROOT/scripts/render_foundation.py"
          test -f "$PAYLOAD_ROOT/scripts/validate_foundation.py"

          echo "BUILDER_ROOT=$PAYLOAD_ROOT" >> "$GITHUB_ENV"
          echo "DIST_ROOT=$GITHUB_WORKSPACE/dist" >> "$GITHUB_ENV"
          echo "RELEASE_ROOT=$GITHUB_WORKSPACE/release-assets" >> "$GITHUB_ENV"

      - name: Confirm deterministic validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import jsonschema
          import yaml
          print(f"PASS: PyYAML {yaml.__version__}")
          print(f"PASS: jsonschema {jsonschema.__version__}")
          PY
          sqlfluff --version

      - name: Validate embedded YAML, schemas, project bindings, and SQL
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILDER_ROOT"

          python - <<'PY'
          from pathlib import Path
          import yaml
          from jsonschema import Draft202012Validator, FormatChecker

          tenant_schema = Path('schemas/tenant-foundation.schema.yaml')
          catalog_schema = Path('schemas/export-object-catalog.schema.yaml')

          checks = [
              (Path('config/export-object-catalog.yaml'), catalog_schema),
              (Path('tenants/pepsico/tenant-foundation.yaml'), tenant_schema),
              (Path('tenants/ascension/tenant-foundation.yaml'), tenant_schema),
              (Path('tenants/delta/tenant-foundation.yaml'), tenant_schema),
              (Path('tenants/mgm/tenant-foundation.yaml'), tenant_schema),
              (Path('tenants/schneider/tenant-foundation.yaml'), tenant_schema),
          ]

          for instance_path, schema_path in checks:
              instance = yaml.safe_load(instance_path.read_text(encoding='utf-8'))
              schema = yaml.safe_load(schema_path.read_text(encoding='utf-8'))
              errors = sorted(
                  Draft202012Validator(
                      schema,
                      format_checker=FormatChecker(),
                  ).iter_errors(instance),
                  key=lambda error: list(error.path),
              )
              if errors:
                  raise SystemExit('\n'.join(
                      f'{instance_path} {list(error.path)}: {error.message}'
                      for error in errors
                  ))
              print(f'PASS schema: {instance_path}')

          catalog = yaml.safe_load(Path('config/export-object-catalog.yaml').read_text(encoding='utf-8'))
          objects = catalog['spec']['objects']
          if len(objects) != 337:
              raise SystemExit(f'Expected 337 SDM objects; found {len(objects)}')

          folders = [row['folder'] for row in objects]
          unique_keys = [row['unique_key'] for row in objects]
          if len(folders) != len(set(folders)):
              raise SystemExit('Duplicate SDM folder names detected')
          if len(unique_keys) != len(set(unique_keys)):
              raise SystemExit('Duplicate SDM unique keys detected')

          profiles = yaml.safe_load(Path('config/project-object-profiles.yaml').read_text(encoding='utf-8'))['spec']
          expected_projects = {'P01', 'P02', 'P03', 'P04', 'P05'}
          if set(profiles) != expected_projects:
              raise SystemExit(f'Project profile mismatch: {set(profiles)}')

          expected_bindings = {
              'pepsico': 'P05',
              'ascension': 'P02',
              'delta': 'P03',
              'mgm': 'P01',
              'schneider': 'P04',
          }
          for slug, project in expected_bindings.items():
              tenant = yaml.safe_load(Path(f'tenants/{slug}/tenant-foundation.yaml').read_text(encoding='utf-8'))
              actual = tenant['spec']['project_binding']['primary_project']
              if actual != project:
                  raise SystemExit(f'{slug} must bind to {project}, found {actual}')
              if tenant['metadata']['foundation_only'] is not True:
                  raise SystemExit(f'{slug} foundation_only must be true')
              if tenant['spec']['ukg_export']['payload_mode'] != 'empty_collections_only':
                  raise SystemExit(f'{slug} payload_mode must be empty_collections_only')

          print('PASS: 337-object catalog and all locked tenant/project bindings')
          PY

          for migration in database/migrations/*.sql; do
            sqlfluff parse --dialect postgres "$migration" >/dev/null
            echo "PASS SQL: $migration"
          done

          grep -qi 'partition by list (tenant_id)' database/migrations/0003_partitioned_facts.sql
          grep -qi 'partition by range (business_date)' database/migrations/0003_partitioned_facts.sql
          grep -qi 'enable row level security' database/migrations/0004_rls_and_access.sql
          grep -qi 'force row level security' database/migrations/0004_rls_and_access.sql

      - name: Render and validate all five foundation packages
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$DIST_ROOT" "$RELEASE_ROOT"
          mkdir -p "$DIST_ROOT" "$RELEASE_ROOT"
          cd "$BUILDER_ROOT"

          for slug in pepsico ascension delta mgm schneider; do
            manifest="tenants/$slug/tenant-foundation.yaml"
            package="$DIST_ROOT/$slug"

            python scripts/render_foundation.py \
              --tenant-manifest "$manifest" \
              --catalog config/export-object-catalog.yaml \
              --project-profiles config/project-object-profiles.yaml \
              --repo-root . \
              --output "$package"

            python scripts/validate_foundation.py \
              --package "$package" \
              --catalog config/export-object-catalog.yaml \
              --schemas schemas

            python - "$package" "$slug" "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import sys

          package = Path(sys.argv[1])
          slug = sys.argv[2]
          sha = sys.argv[3]
          run_id = sys.argv[4]
          run_attempt = sys.argv[5]
          export_root = package / 'sdm-export'
          response_files = sorted(export_root.glob('*/response.json'))

          if len(response_files) != 337:
              raise SystemExit(f'{slug}: expected 337 response.json files; found {len(response_files)}')

          for response_file in response_files:
              payload = json.loads(response_file.read_text(encoding='utf-8'))
              if payload.get('itemsRetrieveResponseDTOs') != []:
                  raise SystemExit(f'Non-empty itemsRetrieveResponseDTOs: {response_file}')
              if payload.get('itemsRetrieveResponses') != []:
                  raise SystemExit(f'Non-empty itemsRetrieveResponses: {response_file}')

          forbidden_fragments = (
              'employee-data', 'employees/', 'persons/', 'workers/', 'punches/',
              'timecards/', 'schedules/', 'payroll-results/', 'biometric-templates/',
              'synthetic-history/', 'generated-data/'
          )
          for file_path in package.rglob('*'):
              if not file_path.is_file():
                  continue
              relative = file_path.relative_to(package).as_posix().lower()
              if any(fragment in relative for fragment in forbidden_fragments):
                  raise SystemExit(f'Forbidden operational or synthetic data path: {relative}')

          metadata = {
              'tenant_slug': slug,
              'foundation_only': True,
              'repository': '${{ github.repository }}',
              'commit_sha': sha,
              'workflow_run_id': run_id,
              'workflow_run_attempt': run_attempt,
              'sdm_response_count': len(response_files),
              'data_generated': False,
          }
          (package / 'GITHUB-BUILD-METADATA.json').write_text(
              json.dumps(metadata, indent=2) + '\n', encoding='utf-8'
          )

          checksum_lines = []
          for file_path in sorted(path for path in package.rglob('*') if path.is_file()):
              if file_path.name == 'SHA256SUMS':
                  continue
              digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
              checksum_lines.append(f'{digest}  {file_path.relative_to(package).as_posix()}')
          (package / 'SHA256SUMS').write_text('\n'.join(checksum_lines) + '\n', encoding='utf-8')

          print(f'PASS {slug}: {len(response_files)} empty SDM response envelopes')
          PY

            zip_name="$RELEASE_ROOT/${slug}-ukg-assurance-foundation-${GITHUB_SHA::12}.zip"
            (
              cd "$DIST_ROOT"
              zip -q -r "$zip_name" "$slug"
            )
            sha256sum "$zip_name" > "$zip_name.sha256"
          done

      - name: Build five-tenant package index
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import os

          release_root = Path(os.environ['RELEASE_ROOT'])
          locked = {
              'pepsico': 'P05',
              'ascension': 'P02',
              'delta': 'P03',
              'mgm': 'P01',
              'schneider': 'P04',
          }
          packages = []
          for slug, primary_project in locked.items():
              matches = sorted(release_root.glob(f'{slug}-ukg-assurance-foundation-*.zip'))
              if len(matches) != 1:
                  raise SystemExit(f'Expected one ZIP for {slug}; found {len(matches)}')
              path = matches[0]
              packages.append({
                  'tenant_slug': slug,
                  'primary_project': primary_project,
                  'filename': path.name,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                  'foundation_only': True,
                  'sdm_object_count': 337,
              })

          index = {
              'format': 'UKG_ASSURANCE_FIVE_TENANT_FOUNDATION_INDEX',
              'format_version': '1.0.0',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'commit_sha': os.environ['GITHUB_SHA'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'foundation_only': True,
              'tenant_count': 5,
              'data_generated': False,
              'packages': packages,
          }
          output = release_root / 'FOUNDATION-PACKAGE-INDEX.json'
          output.write_text(json.dumps(index, indent=2) + '\n', encoding='utf-8')
          print(output.read_text(encoding='utf-8'))
          PY

          test "$(find "$RELEASE_ROOT" -maxdepth 1 -name '*-ukg-assurance-foundation-*.zip' | wc -l)" -eq 5
          test "$(find "$RELEASE_ROOT" -maxdepth 1 -name '*.zip.sha256' | wc -l)" -eq 5

      - name: Generate provenance attestations
        if: github.event_name == 'workflow_dispatch' && inputs.enable_attestation == true
        uses: actions/attest@v4
        with:
          subject-path: 'release-assets/*.zip'

      - name: Upload all five foundation packages
        uses: actions/upload-artifact@v7
        with:
          name: five-tenant-ukg-assurance-foundations-${{ github.sha }}
          path: |
            release-assets/*.zip
            release-assets/*.zip.sha256
            release-assets/FOUNDATION-PACKAGE-INDEX.json
          if-no-files-found: error
          retention-days: ${{ env.RETENTION_DAYS }}
          compression-level: 0

      - name: Publish immutable tagged release
        if: startsWith(github.ref, 'refs/tags/foundation-v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find "$RELEASE_ROOT" -maxdepth 1 -type f -print | sort)
          test "${#assets[@]}" -eq 11
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes 'Five foundation-only UKG SDM-shaped tenant packages. No workforce, payroll-result, biometric, or synthetic-history data is included.' \
            "${assets[@]}"

      - name: Write build summary
        shell: bash
        run: |
          {
            echo '## UKG Assurance Foundation Build'
            echo
            echo '- Five tenant foundations generated.'
            echo '- 337 empty SDM response envelopes generated per tenant.'
            echo '- PostgreSQL/Supabase schema creation scripts included.'
            echo '- RLS and RBAC foundation included.'
            echo '- No workforce, payroll-result, biometric, or synthetic data generated.'
            echo
            echo '### Locked tenant mappings'
            echo
