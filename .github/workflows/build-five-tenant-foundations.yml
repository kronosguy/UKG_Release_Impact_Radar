name: Build All Five UKG Tenant Foundations - Cached Standalone

on:
  workflow_dispatch:
    inputs:
      enable_attestation:
        description: Generate GitHub provenance attestations when repository support is available
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - 'foundation-v*'
    paths:
      - '.github/workflows/build-five-tenant-foundations.yml'

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: ukg-foundation-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'
  EXPECTED_SDM_OBJECTS: '337'
  RETENTION_DAYS: '30'

jobs:
  build-five-foundations:
    name: Materialize, validate, and package all five foundations
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify root dependency file
        shell: bash
        run: |
          set -euo pipefail
          test -f requirements.txt
          echo "PASS: requirements.txt exists at repository root"

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install cached Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Materialize embedded foundation builder
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD_ZIP="$RUNNER_TEMP/ukg-assurance-foundation-builder.zip"
          PAYLOAD_ROOT="$RUNNER_TEMP/ukg-assurance-foundation-builder"

