name: Generate YouTube Playlist Transcripts

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: YouTube playlist URL
        required: true
        type: string
        default: https://youtube.com/playlist?list=PLoOMKjCBaDuX8vYGfcSUgw_84xj3wo62-
      languages:
        description: Comma-separated language preference order
        required: true
        type: string
        default: en,en-US,en-GB
      max_videos:
        description: Maximum videos to process; 0 processes the full playlist
        required: true
        type: number
        default: 0
      fail_on_partial:
        description: Fail when any video cannot be transcribed
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: generate-playlist-transcripts
  cancel-in-progress: false

jobs:
  generate-transcripts:
    name: Generate transcripts
    runs-on: ${{ vars.TRANSCRIPT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 120
    env:
      PLAYLIST_URL: ${{ inputs.playlist_url }}
      LANGUAGE_CODES: ${{ inputs.languages }}
      MAX_VIDEOS: ${{ inputs.max_videos }}
      FAIL_ON_PARTIAL: ${{ inputs.fail_on_partial }}
      RUNNER_ENVIRONMENT: ${{ runner.environment }}
      WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
      WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
      WEBSHARE_PROXY_LOCATIONS: ${{ vars.WEBSHARE_PROXY_LOCATIONS || 'us' }}
      TRANSCRIPT_PROXY_URL: ${{ secrets.TRANSCRIPT_PROXY_URL }}
      YT_DLP_PROXY: ${{ secrets.YT_DLP_PROXY }}
      YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
      YOUTUBE_COOKIES_GZIP_B64: ${{ secrets.YOUTUBE_COOKIES_GZIP_B64 }}
      YOUTUBE_USER_AGENT: ${{ secrets.YOUTUBE_USER_AGENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/workflows/generate-transcripts.yml

      - name: Install transcript dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "yt-dlp[default,curl-cffi]==2026.7.4" \
            "youtube-transcript-api==1.2.4"

      - name: Prepare optional YouTube cookies
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          plain = os.getenv("YOUTUBE_COOKIES_B64", "").strip()
          compressed = os.getenv("YOUTUBE_COOKIES_GZIP_B64", "").strip()

          if plain and compressed:
              raise SystemExit(
                  "Configure only one of YOUTUBE_COOKIES_B64 or "
                  "YOUTUBE_COOKIES_GZIP_B64."
              )

          if not plain and not compressed:
              print("No cookie secret configured.")
              raise SystemExit(0)

          try:
              encoded = compressed or plain
              raw = base64.b64decode(encoded, validate=True)
              if compressed:
                  raw = gzip.decompress(raw)
              text = raw.decode("utf-8-sig")
          except Exception as error:
              raise SystemExit(
                  f"Unable to decode the YouTube cookie secret: {error}"
              ) from error

          text = text.replace("\r\n", "\n").replace("\r", "\n")
          first_line = text.splitlines()[0] if text.splitlines() else ""
          valid_headers = {
              "# HTTP Cookie File",
              "# Netscape HTTP Cookie File",
          }
          if first_line not in valid_headers:
              raise SystemExit(
                  "The decoded cookie file is not Netscape formatted. "
                  "Its first line must be '# Netscape HTTP Cookie File' "
                  "or '# HTTP Cookie File'."
              )

          cookie_path = Path(os.environ["RUNNER_TEMP"]) / "youtube-cookies.txt"
          cookie_path.write_text(text.rstrip() + "\n", encoding="utf-8")
          cookie_path.chmod(0o600)

          with open(
              os.environ["GITHUB_ENV"],
              "a",
              encoding="utf-8",
          ) as environment:
              environment.write(
                  f"YOUTUBE_COOKIES_FILE={cookie_path}\n"
              )

          print("Decoded encrypted YouTube cookie secret.")
          PY

      - name: Validate YouTube access strategy
        shell: bash
        run: |
          set -euo pipefail

          strategies=()

          if [[ -n "${WEBSHARE_PROXY_USERNAME}" && -n "${WEBSHARE_PROXY_PASSWORD}" ]]; then
            strategies+=("Webshare rotating residential proxy")
          elif [[ -n "${TRANSCRIPT_PROXY_URL}" || -n "${YT_DLP_PROXY}" ]]; then
            strategies+=("configured proxy")
          fi

          if [[ -n "${YOUTUBE_COOKIES_FILE:-}" ]]; then
            strategies+=("encrypted cookie file")
          fi

          if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
            strategies+=("self-hosted runner")
          fi

          if (( ${#strategies[@]} == 0 )); then
            echo "::warning::No proxy, cookie file, or self-hosted runner is configured. The workflow will probe one video and fail fast if YouTube blocks the GitHub-hosted IP."
          else
            printf 'YouTube access strategies: %s\n' "$(IFS=', '; echo "${strategies[*]}")"
          fi

          node --version
          python -m yt_dlp --version

      - name: Fetch transcripts and generate Markdown files
        shell: bash
        run: python scripts/fetch_transcripts.py

      - name: Remove temporary cookie file
        if: always()
        shell: bash
        run: |
          if [[ -n "${YOUTUBE_COOKIES_FILE:-}" ]]; then
            rm -f "${YOUTUBE_COOKIES_FILE}"
          fi

      - name: Upload transcripts and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playlist-transcripts-${{ github.run_id }}
          path: transcripts/
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
