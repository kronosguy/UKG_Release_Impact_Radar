name: Generate Tenant Foundation Packages

on:
  workflow_dispatch:
    inputs:
      tenant_filter:
        description: "Optional single tenant (leave empty for all five)"
        required: false
        type: choice
        options:
          - ""
          - delta
          - ascension
          - mgm
          - schneider
          - pepsico
  push:
    branches: [main]
    paths:
      - "tenants/**"
      - "packs/**"
      - "schemas/**"
      - "tools/**"
      - "frozen-invariants.yaml"
      - "UKG_WORKFORCE_ASSURANCE_CONSTITUTION_FINAL.md"
      - ".github/workflows/generate-tenant-foundations.yml"

permissions:
  contents: read
  actions: write

env:
  PYTHON_VERSION: "3.12"
  CONSTITUTION_FILE: UKG_WORKFORCE_ASSURANCE_CONSTITUTION_FINAL.md

jobs:
  # ---------------------------------------------------------------
  # 1. Shared validation (runs once)
  # ---------------------------------------------------------------
  validate-shared:
    name: Validate Shared Constitution & Schemas
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema jsonschema[format] ruamel.yaml sqlfluff markdown-it-py

      - name: Validate Constitution exists and is non-empty
        run: |
          test -f "${{ env.CONSTITUTION_FILE }}"
          test -s "${{ env.CONSTITUTION_FILE }}"
          echo "Constitution present: $(wc -l < ${{ env.CONSTITUTION_FILE }}) lines"

      - name: Validate shared JSON Schemas
        run: |
          python tools/validate_json_schemas.py schemas/ \
            --strict \
            --require decision-passport.schema.json \
            --require evidence-envelope.schema.json \
            --require autonomy-envelope.schema.json

      - name: Validate frozen-invariants.yaml
        run: |
          python tools/validate_frozen_invariants.py frozen-invariants.yaml \
            --require-primary-verified \
            --tenants delta,ascension,mgm,schneider,pepsico

      - name: Lint SQL DDL (partitioning + RLS)
        run: |
          sqlfluff lint postgres/ \
            --dialect postgres \
            --exclude-rules L031,L034

      - name: Upload shared validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: shared-validation-evidence
          path: |
            docs/test-evidence/shared/
            schemas/
            frozen-invariants.yaml
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------
  # 2. Per-tenant foundation generation (matrix)
  # ---------------------------------------------------------------
  generate-tenant-foundation:
    name: Foundation – ${{ matrix.tenant }}
    needs: validate-shared
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        tenant:
          - delta
          - ascension
          - mgm
          - schneider
          - pepsico

    # Allow single-tenant runs from workflow_dispatch
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.tenant_filter == '' ||
      inputs.tenant_filter == matrix.tenant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install generation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jinja2 jsonschema markdown-it-py

      - name: Create output directory
        run: mkdir -p out/${{ matrix.tenant }}

      - name: Validate tenant manifest
        run: |
          python tools/validate_manifest.py \
            tenants/${{ matrix.tenant }}.yaml \
            --constitution ${{ env.CONSTITUTION_FILE }} \
            --require-hierarchy \
            --require-jurisdiction-packs \
            --require-frozen-refs \
            --require-primary-project

      - name: Generate tenant architecture package (FOUNDATION ONLY)
        run: |
          python tools/generate_tenant_foundation.py \
            --tenant tenants/${{ matrix.tenant }}.yaml \
            --constitution ${{ env.CONSTITUTION_FILE }} \
            --frozen-invariants frozen-invariants.yaml \
            --schemas schemas/ \
            --packs packs/ \
            --templates templates/ \
            --out out/${{ matrix.tenant }} \
            --mode foundation \
            --no-data \
            --no-synthetic-history

        # Explicitly forbidden flags are listed so the contract is visible
        # --mode foundation   → architecture docs, manifests, schemas, runbooks only
        # --no-data           → never emit parquet/jsonl worker histories
        # --no-synthetic-history → skip scenario engine entirely

      - name: Verify required foundation artifacts exist
        run: |
          set -e
          REQUIRED=(
            "tenant-architecture.md"
            "tenant-manifest.yaml"
            "frozen-invariants-compiled.yaml"
            "decision-passport.schema.json"
            "roles-and-entitlements.yaml"
            "location-proof-policy.yaml"
            "attestation-catalog.yaml"
            "incident-runbooks.md"
            "primary-project-binding.yaml"
          )
          for f in "${REQUIRED[@]}"; do
            test -f "out/${{ matrix.tenant }}/$f" || {
              echo "MISSING REQUIRED ARTIFACT: $f"
              exit 1
            }
          done
          echo "All required foundation artifacts present for ${{ matrix.tenant }}"

      - name: Package tenant foundation
        run: |
          cd out/${{ matrix.tenant }}
          zip -r ../${{ matrix.tenant }}-foundation.zip .
          ls -lh ../${{ matrix.tenant }}-foundation.zip

      - name: Upload tenant foundation package
        uses: actions/upload-artifact@v4
        with:
          name: foundation-${{ matrix.tenant }}
          path: out/${{ matrix.tenant }}-foundation.zip
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------
  # 3. Final summary (optional but useful)
  # ---------------------------------------------------------------
  summary:
    name: Foundation Generation Summary
    needs: generate-tenant-foundation
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report status
        run: |
          echo "### Tenant Foundation Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tenant     | Primary Project | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-----------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| delta      | P03             | foundation-delta |" >> $GITHUB_STEP_SUMMARY
          echo "| ascension  | P02             | foundation-ascension |" >> $GITHUB_STEP_SUMMARY
          echo "| mgm        | P01             | foundation-mgm |" >> $GITHUB_STEP_SUMMARY
          echo "| schneider  | P04             | foundation-schneider |" >> $GITHUB_STEP_SUMMARY
          echo "| pepsico    | P05             | foundation-pepsico |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** foundation only — no synthetic data generated." >> $GITHUB_STEP_SUMMARY
