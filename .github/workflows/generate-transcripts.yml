name: Generate YouTube Playlist Transcripts

on:
  workflow_dispatch:

jobs:
  generate-transcripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install yt-dlp youtube-transcript-api

      - name: Fetch transcripts and generate Markdown files
        run: |
          cat << 'EOF' > fetch_transcripts.py
          import yt_dlp
          from youtube_transcript_api import YouTubeTranscriptApi
          import re
          import os

          PLAYLIST_URL = 'https://youtube.com/playlist?list=PLoOMKjCBaDuX8vYGfcSUgw_84xj3wo62-'
          OUTPUT_DIR = 'transcripts'

          if not os.path.exists(OUTPUT_DIR):
              os.makedirs(OUTPUT_DIR)

          ydl_opts = {'extract_flat': 'in_playlist', 'quiet': True}

          ytt_api = YouTubeTranscriptApi()

          with yt_dlp.YoutubeDL(ydl_opts) as ydl:
              info = ydl.extract_info(PLAYLIST_URL, download=False)
              
              if 'entries' not in info:
                  print("Could not retrieve playlist entries.")
                  exit(1)

              for entry in info['entries']:
                  video_id = entry['id']
                  title = entry.get('title', f'Unknown_Video_{video_id}')
                  
                  # Sanitize filename for Markdown output
                  safe_title = re.sub(r'[\\/*?:"<>|]', "", title).strip()
                  
                  try:
                      # Fetch transcript using YouTubeTranscriptApi v1.x instance call
                      transcript_obj = ytt_api.fetch(video_id)
                      
                      # Build formatted transcript text
                      transcript_text = "\n".join([f"{item.start:.2f}s: {item.text}" for item in transcript_obj.snippets])
                      
                      file_path = os.path.join(OUTPUT_DIR, f'{safe_title}.md')
                      with open(file_path, 'w', encoding='utf-8') as f:
                          f.write(f'# {title}\n\n')
                          f.write(transcript_text)
                      print(f'Success: {title}')
                  except Exception as e:
                      print(f'Failed for video {title} ({video_id}): {e}')
          EOF
          python fetch_transcripts.py

      - name: Upload transcripts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playlist-transcripts
          path: transcripts/*.md
