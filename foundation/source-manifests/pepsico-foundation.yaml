apiVersion: kronosguy.com/v1alpha1
kind: UKGAssuranceTenantFoundation
metadata:
  name: pepsico
  display_name: PepsiCo
  tenant_id: 10000000-0000-4000-8000-000000000001
  foundation_only: true
spec:
  portfolio_scope: All locations, manufacturing sites, distribution centers, warehouses, routes, and field operations
  project_binding:
    primary_project: P05
    supporting_projects:
    - P01
    - P02
    - P03
    - P04
    binding_mode: locked
  hierarchy_contract:
    levels:
    - ordinal: 1
      key: enterprise
      required: true
    - ordinal: 2
      key: sector
      required: true
    - ordinal: 3
      key: division
      required: true
    - ordinal: 4
      key: region
      required: true
    - ordinal: 5
      key: business_unit
      required: true
    - ordinal: 6
      key: facility
      required: true
    - ordinal: 7
      key: department
      required: true
    - ordinal: 8
      key: line_or_route
      required: true
    records_generated: false
  jurisdiction_packs:
  - key: GLOBAL_DATA_RESIDENCY
    status: reference_only_until_invariant_bundle_is_signed
  - key: US_FEDERAL_WAGE
    status: reference_only_until_invariant_bundle_is_signed
  - key: FMCSA_HOS
    status: reference_only_until_invariant_bundle_is_signed
  - key: STATE_LOCAL_WAGE
    status: reference_only_until_invariant_bundle_is_signed
  - key: BIOMETRIC_PRIVACY
    status: reference_only_until_invariant_bundle_is_signed
  ukg_export:
    format: SDM_FOLDER_RESPONSE_JSON
    file_version: '09.08'
    source_tenant_id: portfolio_pepsico_foundation
    source_label: PepsiCo FOUNDATION
    target_file: pepsico_foundation_export.json
    object_catalog: config/export-object-catalog.yaml
    include_mode: full_catalog
    payload_mode: empty_collections_only
  database:
    tenant_partition_id: 10000000-0000-4000-8000-000000000001
    migrations_path: database/migrations
    operational_rows_generated: false
  api:
    private_subdomain_hint: pepsico.assurance.kronosguy.com
    provisioning_status: not_requested
  generation_prohibitions:
    synthetic_data: true
    production_data: true
    employee_data: true
    biometric_data: true
