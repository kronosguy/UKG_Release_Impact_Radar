apiVersion: kronosguy.com/v1alpha1
kind: UKGAssuranceTenantFoundation
metadata:
  name: delta
  display_name: Delta Air Lines
  tenant_id: 10000000-0000-4000-8000-000000000003
  foundation_only: true
spec:
  portfolio_scope: All U.S. airports and U.S. pilot/flight-attendant crew bases
  project_binding:
    primary_project: P03
    supporting_projects:
    - P01
    - P02
    - P04
    - P05
    binding_mode: locked
  hierarchy_contract:
    levels:
    - ordinal: 1
      key: enterprise
      required: true
    - ordinal: 2
      key: operating_division
      required: true
    - ordinal: 3
      key: workforce_domain
      required: true
    - ordinal: 4
      key: region
      required: true
    - ordinal: 5
      key: crew_base_or_airport
      required: true
    - ordinal: 6
      key: department
      required: true
    - ordinal: 7
      key: workgroup
      required: true
    records_generated: false
  jurisdiction_packs:
  - key: US_FEDERAL_WAGE
    status: reference_only_until_invariant_bundle_is_signed
  - key: FAA_PART_117
    status: reference_only_until_invariant_bundle_is_signed
  - key: AIR_CARRIER_SECURITY
    status: reference_only_until_invariant_bundle_is_signed
  - key: STATE_LOCAL_WAGE
    status: reference_only_until_invariant_bundle_is_signed
  ukg_export:
    format: SDM_FOLDER_RESPONSE_JSON
    file_version: '09.08'
    source_tenant_id: portfolio_delta_foundation
    source_label: Delta Air Lines FOUNDATION
    target_file: delta_foundation_export.json
    object_catalog: config/export-object-catalog.yaml
    include_mode: full_catalog
    payload_mode: empty_collections_only
  database:
    tenant_partition_id: 10000000-0000-4000-8000-000000000003
    migrations_path: database/migrations
    operational_rows_generated: false
  api:
    private_subdomain_hint: delta.assurance.kronosguy.com
    provisioning_status: not_requested
  generation_prohibitions:
    synthetic_data: true
    production_data: true
    employee_data: true
    biometric_data: true
